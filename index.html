<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub Contribution Renderer</title>
<style>
  body {
    margin: 0;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #container {
    width: 240px;
    height: 320px;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div id="debug" style="color:white;font-family:sans-serif;margin-bottom:8px;"></div>
<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user") || "torvalds";

// Show the username for debugging
document.getElementById("debug").innerText = "Username: " + username;

// Attempt fetch (will fail due to CORS now)
fetch(`https://github.com/users/${username}/contributions`)
  .then(res => res.text())
  .then(svg => {
    document.getElementById("container").innerHTML = svg;
  })
  .catch(err => {
    document.getElementById("container").innerText = "Failed to load contributions.";
  });
</script>

</body>
</html>
