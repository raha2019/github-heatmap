<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub Contribution Renderer</title>
<style>
  body {
    margin: 0;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #container {
    width: 240px;
    height: 320px;
    background: #0d1117;
    padding: 10px;
    box-sizing: border-box;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cell {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 2px;
  }

  .level-0 { background: #161b22; }
  .level-1 { background: #0e4429; }
  .level-2 { background: #006d32; }
  .level-3 { background: #26a641; }
  .level-4 { background: #39d353; }

  #title {
    color: white;
    font-family: sans-serif;
    font-size: 14px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div id="container">
  <div id="title"></div>
  <div id="grid" class="grid"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user") || "torvalds";

// 🔐 Replace with your GitHub Personal Access Token
const token = "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";

async function fetchContributions(user) {
  const query = `
  {
    user(login: "${user}") {
      contributionsCollection {
        contributionCalendar {
          weeks {
            contributionDays {
              contributionLevel
            }
          }
        }
      }
    }
  }`;

  const response = await fetch("https://api.github.com/graphql", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query })
  });

  const data = await response.json();
  return data.data.user.contributionsCollection.contributionCalendar.weeks;
}

function renderGrid(weeks) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  weeks.forEach(week => {
    week.contributionDays.forEach(day => {
      const div = document.createElement("div");
      div.className = "cell level-" + levelMap(day.contributionLevel);
      grid.appendChild(div);
    });
  });
}

function levelMap(level) {
  switch(level) {
    case "NONE": return 0;
    case "FIRST_QUARTILE": return 1;
    case "SECOND_QUARTILE": return 2;
    case "THIRD_QUARTILE": return 3;
    case "FOURTH_QUARTILE": return 4;
    default: return 0;
  }
}

(async () => {
  document.getElementById("title").innerText = username + " Contributions";
  const weeks = await fetchContributions(username);
  renderGrid(weeks);
})();
</script>

</body>
</html>
